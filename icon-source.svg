<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3C35"/>
      <stop offset="100%" stop-color="#0F2F2B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#BFA46E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#BFA46E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>
  
  <!-- Lizard silhouette — stylized Western Fence Lizard in profile -->
  <g transform="translate(256, 268) scale(1.0)" fill="#BFA46E">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="72" ry="32" opacity="0.95"/>
    <!-- Head -->
    <ellipse cx="80" cy="-12" rx="36" ry="24" opacity="0.95"/>
    <!-- Snout -->
    <ellipse cx="112" cy="-16" rx="20" ry="14" opacity="0.95"/>
    <!-- Eye -->
    <circle cx="98" cy="-20" r="7" fill="#1A3C35"/>
    <circle cx="99" cy="-21" r="3" fill="#BFA46E" opacity="0.6"/>
    <!-- Tail — long curved -->
    <path d="M-68 8 Q-120 20 -160 60 Q-180 82 -175 100 Q-170 108 -162 105 Q-155 95 -145 75 Q-120 35 -58 15 Z" opacity="0.9"/>
    <!-- Front left leg -->
    <path d="M45 18 L60 52 L50 58 L44 54 L38 60 L32 54 L28 56 L30 48 L38 24 Z" opacity="0.85"/>
    <!-- Front right leg (behind body) -->
    <path d="M50 -28 L62 -58 L56 -64 L50 -60 L44 -66 L38 -60 L34 -62 L38 -52 L42 -32 Z" opacity="0.55"/>
    <!-- Rear left leg -->
    <path d="M-42 22 L-52 60 L-44 68 L-38 62 L-30 70 L-24 64 L-20 68 L-26 54 L-36 26 Z" opacity="0.85"/>
    <!-- Rear right leg (behind body) -->
    <path d="M-38 -26 L-48 -56 L-42 -62 L-36 -56 L-30 -62 L-24 -58 L-22 -62 L-28 -48 L-34 -28 Z" opacity="0.55"/>
    <!-- Dorsal stripe pattern -->
    <path d="M-50 -6 Q-30 -14 0 -14 Q30 -14 55 -10 Q30 -8 0 -8 Q-30 -8 -50 -2 Z" fill="#1A3C35" opacity="0.15"/>
  </g>
  
  <!-- Text label -->
  <text x="256" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#BFA46E" opacity="0.85" letter-spacing="3">WILDLIFE</text>
  <text x="256" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#BFA46E" opacity="0.45" letter-spacing="6">LA COUNTY</text>
</svg>
